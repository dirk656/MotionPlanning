
environment:
  workspace_bounds: [-0.5, -0.5, 0.0, 0.5, 0.5, 1.0]
  output_dir: data/env
  default_count: 2000

obstacles:
  count: 10
  box:
    enabled: true
    size_min: [0.05, 0.05, 0.05]
    size_max: [0.12, 0.12, 0.12]
  sphere:
    enabled: true
    radius_min: 0.05
    radius_max: 0.15
  cylinder:
    enabled: true
    radius_min: 0.05
    radius_max: 0.10
    height_min: 0.05
    height_max: 0.12

collision:
  start_radius: 0.2
  goal_radius: 0.2
  clearance: 0.01
  max_resample: 200
  min_start_goal_distance: 0.4
  max_start_goal_attempt: 200
  path_corridor_radius: 0.3
  min_path_obstacles: 2
  robot_clearance: 0.05
  boundary_margin: 0.05
  sample_pos_attempts: 200
  path_interp_min: 0.1
  path_interp_max: 0.9
  path_noise_scale: 3.0

generation:
  progress_interval: 50

robot:
  urdf_path: robots/franka_panda_gem.urdf