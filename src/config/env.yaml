random_seed: 100

environment:
  workspace_bounds: [-0.5, -0.5, 0.0, 0.5, 0.5, 0.5]
  output_dir: data/env
  default_count: 10000

obstacles:
  count: 8
  box:
    enabled: true
    size_min: [0.03, 0.03, 0.03]
    size_max: [0.12, 0.12, 0.12]
  sphere:
    enabled: true
    radius_min: 0.03
    radius_max: 0.15
  cylinder:
    enabled: true
    radius_min: 0.03
    radius_max: 0.08
    height_min: 0.04
    height_max: 0.12

collision:
  start_radius: 0.1
  goal_radius: 0.1
  clearance: 0.02
  max_resample: 200
  min_start_goal_distance: 0.4
  max_start_goal_attempt: 200
  path_corridor_radius: 0.3
  min_path_obstacles: 2
  robot_clearance: 0.05
  boundary_margin: 0.05

robot:
  urdf_path: robots/franka_panda_gem.urdf