

# 环境整体设置
environment:
  # 格式: [x_min, y_min, z_min, x_max, y_max, z_max]
  # 这里固定为一个 10m x 10m x 3m 的空间
  workspace_bounds: [-0.5, -0.5, 0.0, 0.5, 0.5, 0.5]
  
  # 输出目录
  output_dir: "./data/env"
  
  # 默认生成数量 (如果命令行未指定)
  default_count: 10000

# 障碍物全局设置
obstacles:
  count: 8 # 每个场景生成的障碍物数量
  
  # 尺寸范围配置 (支持动态缩放或固定范围)
  # 这里的数值是绝对值，单位与 workspace_bounds 一致 (米)
  box:
    enabled: true
    size_min: [0.1, 0.1, 0.1]  # [x, y, z] 最小值
    size_max: [0.2, 0.2, 0.2]  # [x, y, z] 最大值
  
  sphere:
    enabled: true
    radius_min: 0.1
    radius_max: 0.2
  
  cylinder:
    enabled: true
    radius_min: 0.05
    radius_max: 0.1
    height_min: 0.05
    height_max: 0.1
collision:
  start_radius: 0.2
  goal_radius: 0.2
  # 起终点之间的最小欧氏距离
  min_start_goal_distance: 0.3
  # 起终点采样最大尝试次数
  max_start_goal_attempt: 200
  # 起终点连线附近的管道半径，保证路径上有障碍物
  path_corridor_radius: 0.5
  # 管道内最少障碍物数量
  min_path_obstacles: 2
  # 障碍物/起终点与机械臂的安全间距
  robot_clearance: 0.1

# 机械臂设置
robot:
  urdf_path: "config/franka_panda_gem.urdf"
  # 基座位置 (默认为工作空间底面中心)
  base_position: [0.0, 0.0, 0.0]

# 随机种子 (可选，设为整数可复现结果，设为 null 则完全随机)
random_seed: null